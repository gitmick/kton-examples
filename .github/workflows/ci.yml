name: ci

# Runs every one of the 14 examples end to end. The examples need the reference binaries
# (plankton / nekton / kton), which are built from the sibling `plankton` repo - so this job checks
# that repo out and builds them. While `plankton` is private, add a repo secret PLANKTON_TOKEN
# (a fine-grained PAT with Contents: read on the plankton repo); once plankton is public the default
# token is enough and the secret can be removed. `${{ github.repository_owner }}` makes this follow the
# examples repo into whatever org it lives in (kton-protocol), no edit needed after the migration.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - name: checkout kton-examples
        uses: actions/checkout@v4

      - name: checkout the plankton kernel (to build the reference binaries)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/plankton
          path: _plankton
          token: ${{ secrets.PLANKTON_TOKEN || github.token }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: r-lib/actions/setup-r@v2

      - name: toolchain (rdflib for the SPARQL gates; xxd for the OpenSSL example)
        run: |
          python -m pip install --quiet rdflib
          command -v xxd >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y xxd; }

      - name: build the three reference binaries onto PATH (bin/ is gitignored)
        run: |
          set -e
          mkdir -p bin
          ( cd _plankton/reference        && go build -trimpath -o "$GITHUB_WORKSPACE/bin/plankton" ./cmd/plankton )
          ( cd _plankton/nekton/reference && go build -trimpath -o "$GITHUB_WORKSPACE/bin/nekton"   ./cmd/nekton   )
          ( cd _plankton/kton/reference   && go build -trimpath -o "$GITHUB_WORKSPACE/bin/kton"     ./cmd/kton     )

      - name: run every example end to end (snapshots regenerate; we assert exit 0)
        run: |
          fail=0
          for d in examples/*/; do
            [ -f "$d/run.sh" ] || continue
            printf '== %s ==\n' "$(basename "$d")"
            if bash "$d/run.sh" >/tmp/out.txt 2>&1; then
              echo "  PASS"
            else
              echo "  FAIL (last 25 lines):"; tail -25 /tmp/out.txt | sed 's/^/    /'; fail=1
            fi
          done
          # ex-08 (Sigstore keyless) is interactive: it runs its automatic part and exits 0, printing the
          # manual sign step - so it passes here without doing the OIDC round-trip.
          exit $fail
